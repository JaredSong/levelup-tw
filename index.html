    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "升級吧",
        "alternateName": "Level Up",
        "url": "https://levelup-tw.pages.dev/",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Any (PWA)",
        "inLanguage": "zh-Hant-TW",
        "description": "免費、離線優先的技術士技能檢定學科題庫，整合官方公告題目、錯題修正、長期複習與計時模擬考。",
        "isAccessibleForFree": true,
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "TWD" },
        "featureList": [
          "正式題庫練習",
          "錯題自動整理與修正",
          "依遺忘曲線排程複習",
          "計時模擬測驗",
          "離線可用",
          "免註冊，進度存在裝置"
        ]
      }
    </script>
    <!--
      Analytics. Two complementary trackers, both safe to run together:
      - GA4 (below) for events/funnels.
      - Cloudflare Web Analytics is injected by Pages itself when enabled in the
        dashboard, so it needs no snippet here.
      Both are network-only: offline PWA sessions simply go unrecorded, which is
      expected for an offline-first app and never blocks study.
    -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y9KLLG6LPB"></script>
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag() { dataLayer.push(arguments) }
      gtag('js', new Date())
      // No automatic pageview: it would fire before the app decides whether this
      // visitor sees the landing or the app, and both render at "/". src/app/analytics.ts
      // sends one hit once the route is known.
      gtag('config', 'G-Y9KLLG6LPB', { send_page_view: false })
    </script>
